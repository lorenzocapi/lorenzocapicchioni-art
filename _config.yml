# =============================================
# Lorenzo Capicchioni Art — Jekyll Config
# =============================================

title: "Lorenzo Capicchioni"
description: "Artist. Paintings, drawings, and video works."
url: "https://lorenzocapi.github.io"
baseurl: "/lorenzocapicchioni-art"

image: "/immagini/layout/social-preview.webp"

author:
  name: "Lorenzo Capicchioni"
  email: "studio@lorenzocapicchioniart.com"

collections:
  schede:
    output: true
    permalink: /opere/:path/

defaults:
  - scope:
      path: ""
      type: "schede"
    values:
      layout: "opera"

lang: "en"
markdown: kramdown
highlighter: rouge
permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - .git/
  - .DS_Store
  - .vscode/

plugins:
  - jekyll-seo-tag
