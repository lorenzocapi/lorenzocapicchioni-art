  <defs>
    <filter id="stamp" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.038" numOctaves="4" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.8" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feMorphology in="displaced" operator="erode" radius="0.5" result="eroded"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="5" result="grain"/>
      <feComposite in="eroded" in2="grain" operator="in"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="184"/>
    </clipPath>
  </defs>

